name: Node.js CI/CD & Deploy to EC2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    # Step 1: Checkout code
    - uses: actions/checkout@v4

    # Step 2: Setup Node
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # Step 3: Install dependencies & build
    - run: npm ci
    - run: npm run build --if-present

    # Step 4: Create .env file locally
    - run: echo "${{ secrets.PROD_ENV }}" > .env

    # Step 5: Copy repo to EC2
    - name: Copy project to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        port: 22
        source: "."
        target: "/home/ubuntu/autopilotx-prod"

    # Step 6: Remove local .env
    - run: rm -f .env

    # Step 7: SSH into EC2 and install dependencies + build
    - name: Install dependencies and build on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        port: 22
        script: |
          cd /home/ubuntu/autopilotx-prod

          # Install Nginx if missing
          if ! command -v nginx > /dev/null; then
            sudo apt update
            sudo apt install nginx -y
          fi

          # Install NPM if missing
          if ! command -v npm > /dev/null; then
            sudo apt install npm -y
          fi

          # Install Node.js 20.x if missing or version < 20
          NODE_VERSION=$(node -v 2>/dev/null || echo "none")
          if [[ "$NODE_VERSION" == "none" || "$NODE_VERSION" < "v20" ]]; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt install -y nodejs
          fi

          node -v
          npm -v

          # Install dependencies on EC2
          if [ -f package.json ]; then
            npm install
          fi

          # Build project
          npm run build --if-present

          # Restart the app (use pm2 or npm start)
          if command -v pm2 > /dev/null; then
            pm2 restart all || pm2 start npm --name "app" -- start
          else
            npm start &
          fi

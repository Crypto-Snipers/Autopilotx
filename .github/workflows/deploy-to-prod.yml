name: Deploy to Prod Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Create target directory on EC2
      - name: Create target directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            sudo mkdir -p /home/ubuntu/autopilotx-prod
            sudo chown -R ubuntu:ubuntu /home/ubuntu/autopilotx-prod
            sudo chmod -R 755 /home/ubuntu/autopilotx-prod

      # Step 3: Copy project files to EC2
      - name: Copy project files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "."
          target: "/home/ubuntu/autopilotx-prod"

      # Step 4: Create .env locally and copy to EC2
      - name: Create .env file
        run: |
          echo "${{ secrets.PROD_ENV }}" > .env

      - name: Copy .env to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: ".env"
          target: "/home/ubuntu/autopilotx-prod/"

      - name: Remove local .env file
        run: rm -f .env

      # Step 5: Install Node.js, NPM, Nginx and dependencies
      - name: Setup environment and install dependencies
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # Update package list
            sudo apt update

            # Install Nginx if missing
            if ! command -v nginx > /dev/null; then
              sudo apt install nginx -y
            fi

            # Install NPM if missing
            if ! command -v npm > /dev/null; then
              sudo apt install npm -y
            fi

            # Install Node.js 20.x if missing or version < 20
            NODE_VERSION=$(node -v 2>/dev/null || echo "none")
            if [[ "$NODE_VERSION" == "none" || "$NODE_VERSION" < "v20" ]]; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt install -y nodejs
            fi
            node -v
            npm -v

            # Install Node dependencies
            cd /home/ubuntu/autopilotx-prod
            if [ -f package.json ]; then
              npm install
            fi

      # Step 6: Build and restart Nginx
      - name: Build and restart Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/autopilotx-prod
            npm run build
            sudo systemctl restart nginx

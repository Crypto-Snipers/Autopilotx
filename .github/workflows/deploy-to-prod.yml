name: Deploy to prod server

on:
  push:
    branches:
      - main

jobs:
  copy-files-to-aws:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create target directory on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo mkdir -p /home/ubuntu/autopilotx-prod
            sudo chown -R ubuntu:ubuntu /home/ubuntu/autopilotx-prod
            sudo chmod -R 755 /home/ubuntu/autopilotx-prod

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/home/ubuntu/autopilotx-prod"

      - name: Create .env file from Secrets
        shell: bash
        run: |
          echo "${{ secrets.PROD_ENV }}" > .env

      - name: Copy .env file to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: ".env"
          target: "/home/ubuntu/autopilotx-prod/"

      - name: Copy .env file to client folder
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: ".env"
          target: "/home/ubuntu/autopilotx-prod/client"

      - name: Remove local .env file
        run: rm -f .env

  deploy-service:
    runs-on: ubuntu-latest
    needs: copy-files-to-aws

    steps:
      - name: Update package list on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo apt update

      - name: Install Nginx on EC2 (if not installed)
        uses: appleboy/ssh-action@master 
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            if ! command -v nginx > /dev/null; then
              echo "Installing Nginx..."
              sudo apt install nginx -y
            else
              echo "Nginx already installed."
            fi

      - name: Install NPM on EC2 (if not installed)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            if ! command -v npm > /dev/null; then
              echo "Installing NPM..."
              sudo apt install npm -y
            else
              echo "NPM already installed."
            fi

           
      - name: Install Node.js 20.x on EC2 (if not version 20+)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            NODE_VERSION=$(node -v 2>/dev/null || echo "none")
            if [[ "$NODE_VERSION" == "none" || "$NODE_VERSION" < "v20" ]]; then
              echo "Installing Node.js 20.x..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt install -y nodejs
            else
              echo "Node.js $NODE_VERSION already installed."
            fi
            node -v
            npm -v

      - name: Install Node dependencies on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e  # stop script if any command fails
            cd /home/ubuntu/autopilotx-prod
            if [ -f package.json ]; then
              echo "Found package.json. Running npm install..."
              npm install
            else
              echo "package.json not found in /home/ubuntu/autopilotx-prod"
              exit 1
            fi


      - name: Restart nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/autopilotx-prod
            npm run build
            sudo service nginx restart
